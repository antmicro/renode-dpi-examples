name: Test DPI Examples

on:
  push:
    paths-ignore:
      - README.md
  pull_request:
  workflow_dispatch:
    inputs:
      renode_url_linux:
        description: URL to a Linux portable Renode package
        required: true
        type: string
      renode_url_windows:
        description: URL to a Windows Renode package
        required: true
        type: string
      verilator_git_ref:
        description: Reference to a Verilator commit
        required: true
        type: string
env:
  VERILATOR_GIT_REF: ${{ inputs.verilator_git_ref || 'v5.010' }}
  ARTIFACTS_PREFIX: renode-dpi-

jobs:
  build-verilator:
    name: Build Verilator
    strategy:
      fail-fast: false
      matrix:
          os: 
            - ubuntu-20.04
            - windows-latest
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: ${{ matrix.os == 'windows-latest' && 'msys2 {0}' || 'bash' }}

    env:
      BUILD_DIR_NAME: build
      CCACHE_DIR_NAME: .ccache

    steps:
      - name: Clone the Verilator repository
        uses: actions/checkout@v3
        with:
          repository: verilator/verilator
          ref: ${{ env.VERILATOR_GIT_REF }}

      - name: Prepare cache for the ccache compiler
        uses: actions/cache@v3
        with:
          path: ${{ github.workspace }}/${{ env.CCACHE_DIR_NAME }}
          key: verilator-${{ runner.os }}_${{ runner.arch }}-${{ matrix.os }}-${{ env.VERILATOR_GIT_REF }}
          restore-keys: verilator-${{ runner.os }}_${{ runner.arch }}

      - name: Install dependencies on Linux
        if: ${{ runner.os != 'Windows' }}
        run: >
          sudo apt update 
          && sudo apt install
          git help2man perl python3 make autoconf g++ flex bison ccache
          libgoogle-perftools-dev numactl perl-doc
          libfl2
          libfl-dev
          zlibc zlib1g zlib1g-dev

      - name: Install dependencies on Windows
        uses: msys2/setup-msys2@v2
        if: ${{ runner.os == 'Windows' }}
        with:
          update: true
          install: >
            git
            unzip
            autoconf
            findutils
            bison
            flex
            help2man
            gperf
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make 
            mingw-w64-x86_64-python
            mingw-w64-x86_64-python-pip
            mingw-w64-x86_64-ccache
            mingw-w64-x86_64-autotools

      - name: Fix include bug on Windows
        if: ${{ runner.os == 'Windows' }}
        run: cp /usr/include/FlexLexer.h include/

      - name: Build
        run: |
          export CCACHE_DIR=$PWD/$CCACHE_DIR_NAME
          autoconf
          ./configure --prefix $PWD/$BUILD_DIR_NAME
          make -j `nproc`
          make install
          ccache -s
      
      - name: Prepare artifacts
        run: |
          mv ${{ env.BUILD_DIR_NAME }}/share/verilator .
          rm ${{ env.BUILD_DIR_NAME }}/bin/verilator_bin_dbg*
          mv ${{ env.BUILD_DIR_NAME }}/bin/* verilator/bin
          tar -cvf verilator.tar verilator

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: verilator_${{ env.VERILATOR_GIT_REF }}-${{ runner.os }}_${{ runner.arch }}
          path: verilator.tar

  build-fastvdma-samples:
    name: Build FastVDMA samples
    strategy:
      matrix:
        bus_width: [8, 16, 32]
    runs-on: ubuntu-latest

    env:
      FASTVDMA_GIT_REF: 0172db9
      FASTVDMA_DIR: ${{ github.workspace }}/fastvdma
      SAMPLE_DIR: ${{ github.workspace }}/samples/axi_fastvdma
      CUSTOM_SAMPLE_NAME: axi_fastvdma-${{ matrix.bus_width }}
      CUSTOM_SAMPLE_DIR: ${{ github.workspace }}/samples/axi_fastvdma-${{ matrix.bus_width }}

    steps:
      - name: Checkout the renode-dpi-examples repository
        uses: actions/checkout@v3
      - name: Clone the FastVDMA repository
        uses: actions/checkout@v3
        with:
          repository: antmicro/fastvdma
          ref: ${{ env.FASTVDMA_GIT_REF }}
          path: fastvdma
          
      - name: Install dependencies
        run: |
          sudo apt-get --allow-releaseinfo-change update && sudo apt-get install -y --no-install-recommends apt-transport-https curl gnupg graphicsmagick-imagemagick-compat graphicsmagick-imagemagick-compat default-jdk default-jre
          echo "deb https://repo.scala-sbt.org/scalasbt/debian all main" | sudo tee /etc/apt/sources.list.d/sbt.list:wq
          echo "deb https://repo.scala-sbt.org/scalasbt/debian /" | sudo tee /etc/apt/sources.list.d/sbt_old.list
          curl -sL "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x2EE0EA64E40A89B84B2DF73499E82A75642AC823" | sudo apt-key add
          sudo apt-get update && sudo apt-get install -y sbt
      
      - name: Build HDL
        run: |
          cp -R ${{ env.SAMPLE_DIR }} ${{ env.CUSTOM_SAMPLE_DIR}}
          CONFIG_JSON=${{ env.CUSTOM_SAMPLE_DIR }}/config_${{ matrix.bus_width }}
          jq --argjson width ${{ matrix.bus_width }} \
          '.readDataWidth = $width | .writeDataWidth = $width' \
          ${{ env.SAMPLE_DIR }}/config_base.json > $CONFIG_JSON

          cd ${{ env.FASTVDMA_DIR }}
          make verilog CONFIG_FILE=$CONFIG_FILE
          cp DMATop*.v ${{ env.CUSTOM_SAMPLE_DIR }}/DMATop.v
      
      - name: Preset CMake cache variable
        run: |
          mkdir -p ${{ env.CUSTOM_SAMPLE_DIR }}/build
          cd ${{ env.CUSTOM_SAMPLE_DIR }}/build
          cmake .. -DAXI_DATA_WIDTH=${{ matrix.bus_width }}

      - name: Clean up custom sample dir
        run: |
          cd ${{ env.CUSTOM_SAMPLE_DIR }}
          rm *_linux.*
          rm config_base.json
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: ${{ env.ARTIFACTS_PREFIX }}axi_fastvdma-${{ matrix.bus_width }}
          path: ${{ env.CUSTOM_SAMPLE_DIR }}


  run-example:
    name: Run example
    needs: [build-fastvdma-samples, build-verilator]
    strategy:
      fail-fast: false
      matrix:
        sample:
          - axi_ram
          - axi_fastvdma
          - axi_fastvdma-32
        config:
          - os: ubuntu-20.04
            renode_url: ${{ inputs.renode_url_linux || 'https://dl.antmicro.com/projects/renode/custom_builds/renode-1.13.3+20230704git31c1e5af.linux-portable.tar.gz' }}
          - os: windows-latest
            renode_url: ${{ inputs.renode_url_windows || 'https://dl.antmicro.com/projects/renode/custom_builds/renode_1.13.3+20230704git31c1e5af.zip' }}
    runs-on: ${{ matrix.config.os }}
    defaults:
      run:
        shell: bash

    env:
      SAMPLE_NAME: ${{ matrix.sample }}
      SAMPLE_DIR: ${{ github.workspace }}/samples/${{ matrix.sample }}
      ARTIFACTS_DIR_NAME: artifacts
      CC: ${{ matrix.config.os == 'ubuntu-20.04' && 'gcc-10' || 'gcc' }}
      CXX: ${{ matrix.config.os == 'ubuntu-20.04' && 'g++-10' || 'g++' }}

    steps: 
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        id: python-setup
        with:
          python-version: '3.11'
      
      - name: Download the Verilator artifact
        uses: actions/download-artifact@v3
        with:
          name: verilator_${{ env.VERILATOR_GIT_REF }}-${{ runner.os }}_${{ runner.arch }}
          path: ${{ github.workspace }}

      - name: Untar the Verilator artifact
        run: tar -xf verilator.tar

      - name: Download Renode
        run: curl -sSLO ${{ matrix.config.renode_url }}

      - name: Unpack Renode for Linux
        if: ${{ runner.os != 'Windows' }}
        run: |
          mkdir renode
          tar xf renode*.tar.gz --strip-components 1 -C renode

      - name: Unpack Renode for Windows
        if: ${{ runner.os == 'Windows' }}
        run: |
          unzip renode*.zip
          rm renode*.zip
          mv renode_* renode

      - name: Install Robot framework dependencies
        run: python3 -m pip install -r renode/tests/requirements.txt

      - name: Download a custom build of the axi_fastvdma
        if: ${{ startsWith(matrix.sample, 'axi_fastvdma-') }}
        uses: actions/download-artifact@v3
        with:
          name: ${{ env.ARTIFACTS_PREFIX }}${{ env.SAMPLE_NAME }}
          path: ${{ env.SAMPLE_DIR }}
          

      - name: Prepare the sample and the artifacts directory
        run: |
          mkdir -p ${{ env.SAMPLE_DIR }}/build
          mkdir ${{ env.ARTIFACTS_DIR_NAME }}

      - name: Build the sample on Linux
        if: ${{ runner.os != 'Windows' }}
        run: |
          cd ${{ env.SAMPLE_DIR }}/build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DUSER_RENODE_DIR=../../../renode -DUSER_VERILATOR_DIR=../../../verilator
          make
          cp verilated ${{ github.workspace }}/${{ env.ARTIFACTS_DIR_NAME }}/
        
      - name: Build the sample on Windows
        if: ${{ runner.os == 'Windows' }}
        shell: powershell
        run: |
          cd ${{ env.SAMPLE_DIR }}\build
          cmake.exe .. -G "MinGW Makefiles" -DUSER_RENODE_DIR="..\..\..\renode" -DUSER_VERILATOR_DIR="..\..\..\verilator"
          mingw32-make.exe
          cp verilated.exe ${{ github.workspace }}\${{ env.ARTIFACTS_DIR_NAME }}\


      - name: Run tests on Linux
        if: ${{ runner.os != 'Windows' }}
        run: >
          renode/renode-test
          ${{ env.SAMPLE_DIR}}/test*.robot
          --include verilator

      - name: Run tests on Windows
        if: ${{ runner.os == 'Windows' }}
        shell: powershell
        run: >
          renode\bin\renode-test.bat
          ${{ env.SAMPLE_DIR}}\test*.robot
          --include verilator
          --variable=VERILATED_BINARY:${{ env.SAMPLE_DIR }}\build\verilated.exe

      - name: Copy the output of test
        if: always()
        run: |
          mv log.html ${{ env.ARTIFACTS_DIR_NAME }}/
          mv report.html ${{ env.ARTIFACTS_DIR_NAME }}/
          mv robot_output.xml ${{ env.ARTIFACTS_DIR_NAME }}/

      - name: Prepare artifacts
        if: always()
        run: |
          cd ${{ env.ARTIFACTS_DIR_NAME }}  
          for file in * ; do mv -- "$file" "${{ env.ARTIFACTS_PREFIX }}$file" ; done

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: ${{ env.ARTIFACTS_PREFIX }}${{ env.SAMPLE_NAME }}-${{ runner.os }}-${{ runner.arch }}
          path: ${{ env.ARTIFACTS_DIR_NAME }}/*
